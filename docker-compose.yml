services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: retail_sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-SuperStrong@Password123}
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - retail_network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q \"SELECT 1\" || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q \"SELECT 1\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: always

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: retail_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - retail_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: always

  product-inventory-service:
    build:
      context: ./src
      dockerfile: ProductInventoryService/ProductInventoryService.API/Dockerfile
    container_name: retail_product_inventory_service
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:80
      ConnectionStrings__DefaultConnection: Server=sqlserver;Database=ProductInventoryDB;User Id=sa;Password=${MSSQL_SA_PASSWORD:-SuperStrong@Password123};TrustServerCertificate=True;
      RabbitMQ__HostName: rabbitmq
      RabbitMQ__UserName: ${RABBITMQ_USER:-guest}
      RabbitMQ__Password: ${RABBITMQ_PASSWORD:-guest}
      JwtSettings__Secret: ${JWT_SECRET:-ThisIsAVerySecretKeyThatMustBeAtLeast32CharactersLongToWorkWithHmacSha256!}
      JwtSettings__Issuer: ${JWT_ISSUER:-retail_user_report_service}
      JwtSettings__Audience: ${JWT_AUDIENCE:-retail_app}
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "5001:80"
    networks:
      - retail_network
    restart: always

  order-sales-service:
    build:
      context: ./src
      dockerfile: OrderSalesService/OrderSalesService.API/Dockerfile
    container_name: retail_order_sales_service
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:80
      ConnectionStrings__DefaultConnection: Server=sqlserver;Database=OrderSalesDB;User Id=sa;Password=${MSSQL_SA_PASSWORD:-SuperStrong@Password123};TrustServerCertificate=True;
      RabbitMQ__HostName: rabbitmq
      RabbitMQ__UserName: ${RABBITMQ_USER:-guest}
      RabbitMQ__Password: ${RABBITMQ_PASSWORD:-guest}
      InternalApis__ProductService: http://product-inventory-service:80
      JwtSettings__Secret: ${JWT_SECRET:-ThisIsAVerySecretKeyThatMustBeAtLeast32CharactersLongToWorkWithHmacSha256!}
      JwtSettings__Issuer: ${JWT_ISSUER:-retail_user_report_service}
      JwtSettings__Audience: ${JWT_AUDIENCE:-retail_app}
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "5002:80"
    networks:
      - retail_network
    restart: always

  user-report-service:
    build:
      context: ./src
      dockerfile: UserReportService/UserReportService.API/Dockerfile
    container_name: retail_user_report_service
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:80
      ConnectionStrings__DefaultConnection: Server=sqlserver;Database=UserReportDB;User Id=sa;Password=${MSSQL_SA_PASSWORD:-SuperStrong@Password123};TrustServerCertificate=True;
      RabbitMQ__HostName: rabbitmq
      RabbitMQ__UserName: ${RABBITMQ_USER:-guest}
      RabbitMQ__Password: ${RABBITMQ_PASSWORD:-guest}
      JwtSettings__Secret: ${JWT_SECRET:-ThisIsAVerySecretKeyThatMustBeAtLeast32CharactersLongToWorkWithHmacSha256!}
      JwtSettings__Issuer: ${JWT_ISSUER:-retail_user_report_service}
      JwtSettings__Audience: ${JWT_AUDIENCE:-retail_app}
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "5003:80"
    networks:
      - retail_network
    restart: always

  api-gateway:
    build:
      context: ./src
      dockerfile: ApiGateway/ApiGateway/Dockerfile
    container_name: retail_api_gateway
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:80
      DownstreamServices__ProductInventory: http://product-inventory-service:80
      DownstreamServices__OrderSales: http://order-sales-service:80
      DownstreamServices__UserReport: http://user-report-service:80
      Cors__AllowedOrigins__0: http://localhost:8080
      Cors__AllowedOrigins__1: http://127.0.0.1:8080
      Cors__AllowedOrigins__2: http://localhost:5173
      Cors__AllowedOrigins__3: http://127.0.0.1:5173
    depends_on:
      - product-inventory-service
      - order-sales-service
      - user-report-service
    ports:
      - "5000:80"
    networks:
      - retail_network
    restart: always

  frontend:
    build:
      context: ./frontend/typescript-version
      dockerfile: Dockerfile
    container_name: retail_frontend
    depends_on:
      - api-gateway
    ports:
      - "8080:80"
    networks:
      - retail_network
    restart: always

networks:
  retail_network:
    name: retail_network
    driver: bridge

volumes:
  sqlserver_data:
  rabbitmq_data:
